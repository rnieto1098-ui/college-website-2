<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>College Ranking App</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <header class="hero">
      <div class="container">
        <p class="badge">College Ranking App</p>
        <h1>Find the Right College</h1>
        <p class="hero-subtitle">
          Compare schools by location, majors, affordability, and size using sample data.
        </p>
      </div>
    </header>

    <main class="container">
      <section class="card" aria-labelledby="search-heading">
        <h2 id="search-heading">Search Colleges</h2>
        <div class="search-wrap">
          <input
            type="search"
            id="college-search"
            placeholder="Search by college name..."
            aria-label="Search by college name"
          />
          <button id="clear-search" type="button">Clear</button>
        </div>
        <ul id="college-results" class="college-list" aria-live="polite"></ul>
      </section>

      <section class="card" aria-labelledby="map-heading">
        <h2 id="map-heading">Explore by State (Placeholder Map)</h2>
        <p class="section-note">Tap a state button to simulate selecting a state.</p>
        <div id="state-map" class="state-map" role="group" aria-label="U.S. state buttons"></div>
      </section>

      <section class="card" aria-labelledby="majors-heading">
        <h2 id="majors-heading">Top Majors & Rankings</h2>
        <div id="majors-grid" class="majors-grid"></div>
      </section>

      <section class="card" aria-labelledby="prefs-heading">
        <h2 id="prefs-heading">Your College Preferences</h2>
        <form id="preferences-form" class="preferences-form">
          <label>
            Preferred State
            <select id="pref-state" name="state">
              <option value="">Any state</option>
            </select>
          </label>

          <label>
            Desired Major
            <select id="pref-major" name="major">
              <option value="">Any major</option>
            </select>
          </label>

          <label>
            Budget (yearly tuition)
            <select id="pref-budget" name="budget">
              <option value="">Any budget</option>
              <option value="20000">Up to $20,000</option>
              <option value="30000">Up to $30,000</option>
              <option value="40000">Up to $40,000</option>
              <option value="50000">Up to $50,000</option>
            </select>
          </label>

          <label>
            School Size
            <select id="pref-size" name="size">
              <option value="">Any size</option>
              <option value="Small">Small</option>
              <option value="Medium">Medium</option>
              <option value="Large">Large</option>
            </select>
          </label>

          <button type="submit">Find Matches</button>
        </form>
        <ul id="match-results" class="college-list"></ul>
      </section>
    </main>

    <script src="script.js"></script>
  </body>
</html>
